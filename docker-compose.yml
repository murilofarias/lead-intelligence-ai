services:
  backend:
    build: ./backend
    env_file: ./backend/.env.example
    environment:
      FIXTURE_MODE: "true"
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- -H 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
