app = "lead-intelligence-ai"
primary_region = "iad"

[build]

[env]
  FIXTURE_MODE = "true"
  CORS_ORIGINS = "https://lead-intelligence-ai.vercel.app"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
